<div class="container">
  <div class="row">
    <div class="col">
      <h2>{{ html.title }}</h2>
    </div>
    <div class="col text-end">
      <button type="button" class="btn btn-primary" (click)="onNewRegister()">
        {{ html.newRegistration }}
      </button>
    </div>
  </div>
  <div class="row">
    <app-table [tableConfig]="configTable()"></app-table>
  </div>
</div>

<app-modal [isOpen]="isOpen()" (closed)="onClosed()">
  <app-modal-view [person]="havePerson()" [isNaturalPerson]="isNaturalPerson()" (onClosed)="onClosed()"/>
</app-modal>
