<div class="container">
  <div class="row">
    <div class="col">
      <h2>{{ html.title }}</h2>
    </div>
    <div class="col text-end">
      <button type="button" class="btn btn-primary" (click)="onNewRegister()">
        {{ html.newRegistration }}
      </button>
    </div>
  </div>
  <div class="row">
    <app-table [tableConfig]="configTable()"></app-table>
  </div>
</div>

<app-modal [isOpen]="isOpen()">
  @if (isDeactivating()) {
    <app-modal-deactivate [person]="havePerson()" (onClosed)="onClosed()" (onDeactivate)="onDeactivate($event)" />
  } @else {
    <app-modal-view [person]="havePerson()" (onClosed)="onClosed()" />
  }
</app-modal>
