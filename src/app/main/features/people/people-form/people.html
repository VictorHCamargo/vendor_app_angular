<div class="container">
  <form>
    <div class="row mb-3 mt-3">
      <div class="col">
        <h1>Cadastro de {{ html.title }}</h1>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col">
        <app-form-input
          [messageId]="'name'"
          [fieldTree]="formData.name"
          [type]="'input'"
          [info]="{
            idLabel: 'name',
            nameLabel: html.nameLabel,
            type: 'text',
          }"
        />
      </div>
      <div class="col">
        <app-form-input
          [messageId]="'nickname'"
          [fieldTree]="formData.nickname"
          [type]="'input'"
          [info]="{
            idLabel: 'nickname',
            nameLabel: html.nicknameLabel,
            type: 'text',
          }"
        />
      </div>
      <div class="col">
        <label class="form-label">Status</label>
        <br />
        <app-form-input
          [messageId]="'active'"
          [fieldTree]="formData.active"
          [type]="'radio'"
          [info]="{
            options: [
              {
                data: 'Ativo',
                value: 'A',
              },
              {
                data: 'Inativo',
                value: 'I',
              },
            ],
          }"
        />
      </div>
    </div>
    <div class="row mb-3">
      <div class="col">
        <app-form-input
          [messageId]="'state'"
          [fieldTree]="formData.stateDocument"
          [type]="'input'"
          [info]="{
            idLabel: 'stateDocument',
            nameLabel: html.stateLabel,
            type: 'number',
          }"
        />
      </div>
      <div class="col">
        <app-form-input
          [messageId]="'federal'"
          [fieldTree]="formData.federalDocument"
          [type]="'input'"
          [info]="{
            idLabel: 'federalDocument',
            nameLabel: html.federalLabel,
            type: 'number',
          }"
        />
      </div>
    </div>

    <div class="row">
      <div class="col d-grid gap-2 d-md-flex justify-content-md-end">
        @if (this.saving()) {
          <img src="../../../../assets/loading.png" class="rounded loading-animation" />
        } @else {
          <button type="button" class="btn btn-danger" (click)="onCancel()">Voltar</button>
          <button [disabled]="isDisabled" type="button" class="btn btn-primary" (click)="onSalve()">
            Salvar
          </button>
        }
      </div>
    </div>
