<div class="toast-container position-fixed top-0 end-0 p-4">
  @for (toast of toasts(); track toast.id) {
    <div
      class="toast align-items-center border-1 show mb-2"
      [class.text-success]="toast.styleToast == 'success'"
      [class.text-danger]="toast.styleToast == 'danger'"
      [class.text-info]="toast.styleToast == 'info'"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <div class="d-flex justify-content-between align-items-center">
        <div class="toast-body h6">
          {{ toast.message }}
        </div>
        <button
          type="button"
          class="btn-close"
          (click)="remove(toast.id)"
          aria-label="Close"
        ></button>
      </div>

      <div class="progress" style="height: 4px">
        <div
          class="progress-bar loading-progress"
          [class.bg-success]="toast.styleToast == 'success'"
          [class.bg-danger]="toast.styleToast == 'danger'"
          [class.bg-info]="toast.styleToast == 'info'"
          [style.animation-duration.ms]="toast.duration"
        ></div>
      </div>
    </div>
  }
</div>
