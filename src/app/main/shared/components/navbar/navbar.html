<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Vendor App (Angular)</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNavDropdown"
      aria-controls="navbarNavDropdown"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          @for (component of components(); track $index) {
            <a
              class="nav-link dropdown-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              {{ component.name }}
            </a>
            <ul class="dropdown-menu">
              @for (item of component.children; track $index) {
                <li>
                  @if(!item.external) {
                    <a class="dropdown-item" [routerLink]="item.way">{{ item.name }}</a>
                  } @else {
                    <a class="dropdown-item" [href]="item.way">{{ item.name }}</a>
                  }
                </li>
              }
            </ul>
          }
        </li>
      </ul>
    </div>
  </div>
</nav>
