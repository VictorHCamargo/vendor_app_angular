<app-modal [isOpen]="isLoading()">
  <div class="card border-0 rounded-4 p-4 text-center mx-auto" style="max-width: 380px">
    <div class="card-body">
      <div class="spinner-border text-primary my-3" style="width: 3rem; height: 3rem" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <h3 class="card-title h4 fw-bold text-dark mb-2">Carregando...</h3>
    </div>
  </div>
</app-modal>
