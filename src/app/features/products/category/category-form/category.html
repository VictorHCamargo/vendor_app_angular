<div class="container">
  <form>
    <div class="row mb-3 mt-3">
      <div class="col">
        <h1>Categoria de Produtos</h1>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col">
          <label for="nome" class="form-label">Nome da Categoria</label>
          <input [field]="formData.name" type="text" class="form-control" id="nome" aria-describedby="nomeHelp">
          <app-error-messages [message]="formData.name()" [messageId]="idHelp"></app-error-messages>
      </div>
    </div>
    
    <div class="row">
      <div class="col d-grid gap-2 d-md-flex justify-content-md-end">
        @if(this.saving()) {
          <img src="../../../../assets/loading.png" class="rounded loading-animation">
        } @else {
          <button type="button" class="btn btn-danger" (click)="onCancel()">Voltar</button>
          <button [disabled]="isDisabled" type="button" class="btn btn-primary" (click)="onSalve()">Salvar</button>
        }
      </div>
    </div>
  </form>
</div>
