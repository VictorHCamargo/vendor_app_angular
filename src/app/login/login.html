<div class="login-wrapper d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg p-4 border-0" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">VENDOR</h2>
            <p class="text-muted small">Entre com suas credenciais para acessar</p>
        </div>

        <form>
            <div class="mb-3">
                <label for="floatingInput" class="form-label fw-semibold">Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                    <input [field]="formData.email" type="email" class="form-control border-start-0 bg-light" id="floatingInput" placeholder="nome@exemplo.com">
                </div>
                <app-error-messages [message]="formData.email()" [messageId]="'floatingInput'"></app-error-messages>
            </div>

            <div class="mb-4">
                <label for="floatingPassword" class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                    <input [field]="formData.password" type="password" class="form-control border-start-0 bg-light" id="floatingPassword" placeholder="••••••">
                </div>
                <app-error-messages [message]="formData.password()" [messageId]="'floatingPassword'"></app-error-messages>
            </div>

            <button (click)="onSign()" type="button" class="btn btn-primary w-100 py-2 fw-bold shadow-sm" style="border-radius: 8px;">
                Entrar no Painel
            </button>

        </form>
    </div>
</div>
